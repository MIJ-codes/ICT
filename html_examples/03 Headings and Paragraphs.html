<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Headings and Paragraphs</title>
</head>
<body>
    <h1>Main Heading</h1>
    <h2>Sub Heading</h2>
    <h3>Smaller Heading</h3>
    <h4>This is heading 4</h4>
    <h5>This is heading 5</h5>
    <h6>This is heading 6</h6>

     <!-- Normal text can appear directly in the body, but it has no special structure. -->

     This is normal text.

     <!-- A paragraph groups normal text into a proper block of writing. -->

     <p>This is a paragraph of normal text.</p>
    <p>This is another paragraph of normal text.</p>
    <p>This is a paragraph.</p>

    <!-- WHAT: <h1> to <h6> create headings.
         WHY: Headings organize the page into topics and sections.
         EFFECT: Higher-level headings appear more important. -->

    <!-- WHAT: <p> creates a paragraph.
         WHY: Paragraphs group normal text.
         EFFECT: Browser adds spacing around paragraph text. -->

    <!-- WHAT: Multiple paragraph tags create separate paragraphs.
         WHY: Each paragraph is its own block of text.
         EFFECT: Browser adds space between the paragraphs. -->

    <!-- TRY THIS:
         1. Change normal text into a heading
         2. Add another paragraph
         3. Compare <h1> and <h6> size -->

    <!-- COMMON MISTAKE:
         Using headings only to make text big.
         Headings should show document structure. -->

    <!-- SUMMARY:
         - <h1> to <h6> are headings.
         - <p> creates paragraph text.
         - Heading numbers show importance. -->
</body>
</html>
