<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breaks Lines and Spacing</title>
</head>
<body>
    <h1>Breaks Lines and Spacing</h1>

    <p>First line<br>Second line<br><br>Fourth line after one blank line</p>
    <hr>
    <p>
        HTML ignores extra spaces
        and code line breaks
        in normal paragraph text.
    </p>

    <!-- WHAT: &nbsp; means non-breaking space.
         WHY: HTML collapses normal spaces, so &nbsp; is used when visible extra spaces are needed.
         NOTE: Use it for special text spacing, not for full page layout. -->
    <p>
        This&nbsp;&nbsp;&nbsp;paragraph&nbsp;&nbsp;shows&nbsp;&nbsp;&nbsp;&nbsp;extra spaces.
    </p>

    <!-- WHAT: hr can use old attributes such as align, width, size and color.
         NOTE: These attributes are exam/reference only. Modern HTML uses CSS. -->
    <hr align="center" width="60%" size="4" color="blue">

    <!-- WHAT: <br> creates a visible line break.
         WHY: Sometimes a line break is part of the content.
         EFFECT: Text after <br> starts on a new line. -->

    <!-- WHAT: <hr> creates a thematic break.
         WHY: It separates related sections.
         EFFECT: Browser shows a horizontal line. -->

    <!-- WHAT: HTML collapses extra spaces and code line breaks.
         WHY: Browser formats normal text automatically.
         EFFECT: Many spaces usually display as one space. -->

    <!-- TRY THIS:
         1. Add another <br>
         2. Remove <hr>
         3. Add many spaces inside the paragraph and compare -->

    <!-- COMMON MISTAKE:
         Using many <br> tags for layout spacing.
         Use CSS later for page layout spacing. -->

    <!-- SUMMARY:
         - <br> breaks a line.
         - <hr> separates sections.
         - HTML ignores most extra spaces in normal text.
         - &nbsp; creates visible extra spaces.
         - hr align, width, size and color are old exam-style attributes. -->
</body>
</html>
