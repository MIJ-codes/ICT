<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Non-breaking Space</title>
    <style>
        @page { size: 6in 0.42in; margin: 0.08in; }
        body {
            font-family: "Times New Roman", serif;
            font-size: 18px;
            line-height: 1.2;
            margin: 0;
            background: white;
            color: black;
        }
        p {
            margin: 0;
        }
    </style>
</head>
<body>
    <p>This&nbsp;&nbsp;&nbsp;paragraph&nbsp;&nbsp;has extra spaces.</p>

</body>
</html>
