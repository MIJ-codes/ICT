<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Whitespace Collapsing</title>
    <style>
        @page { size: 6.5in 0.42in; margin: 0.08in; }
        body {
            font-family: "Times New Roman", serif;
            font-size: 18px;
            line-height: 1.2;
            margin: 0;
            background: white;
            color: black;
        }
        p {
            margin: 0;
        }
    </style>
</head>
<body>
    <p>
        This       paragraph
        contains      many spaces
        and line breaks in source code.
    </p>
</body>
</html>
