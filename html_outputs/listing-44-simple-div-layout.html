<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Simple Div Layout</title>
<style>
@page { size: 620px 322px; margin: 14px; }
html, body { margin: 0; padding: 0; }
body { font-family: "Times New Roman", serif; font-size: 18px; line-height: 1.25; color: #000; background: white; }
h1 { font-size: 30px; margin: 0 0 10px; }
h2 { font-size: 22px; margin: 10px 0 6px; }
p { margin: 0 0 8px; }
ul, ol { margin-top: 4px; margin-bottom: 8px; }
dl { margin-top: 4px; margin-bottom: 8px; }
table { margin: 0 0 8px; }
img { max-width: 220px; max-height: 130px; }
iframe { border: 1px solid #777; }
header, footer, nav, main, section, article { display: block; }
header, footer { padding: 6px; }
nav a { margin-right: 8px; }
textarea { vertical-align: top; }
</style>
</head>
<body>
<div class="container" style="width:100%;">
    <div class="header" style="background-color:gray;">
        <h1 align="center">Header</h1>
    </div>
    <div class="sidebar" style="float:left; width:25%;">
        Sidebar
    </div>
    <div class="content" style="float:left; width:75%;">
        Main Content
    </div>
    <div class="footer" style="clear:left;">
        Footer
    </div>
</div>
</body>
</html>
