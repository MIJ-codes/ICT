<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Paragraph and Line Break</title>
    <style>
        @page { size: 6in 1.05in; margin: 0.08in; }
        body {
            font-family: "Times New Roman", serif;
            font-size: 18px;
            line-height: 1.2;
            margin: 0;
            background: white;
            color: black;
        }
        p {
            margin: 0 0 5px 0;
        }
        p:last-child {
            margin-bottom: 0;
        }
    </style>
</head>
<body>
    <p>This is the first paragraph.</p>
    <p>This line has<br>two lines inside one paragraph.</p>
</body>
</html>
