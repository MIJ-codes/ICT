<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Horizontal Rule</title>
    <style>
        @page { size: 6in 0.95in; margin: 0.08in; }
        body {
            font-family: "Times New Roman", serif;
            font-size: 18px;
            line-height: 1.2;
            margin: 0;
            background: white;
            color: black;
        }
        p {
            margin: 0;
        }
        hr {
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <p>Section One</p>
    <hr>
    <p>Section Two</p>
</body>
</html>
